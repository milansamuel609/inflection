name: CMake on multiple platforms

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'inflection/**'
      - '!data/**'
      - '!documents/**'
      - '!fst/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]
        include:
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++

          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++

          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            cmake_generator: "Visual Studio 17 2022"

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: 'true'

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        PROJECT_ROOT="${{ github.workspace }}/inflection"
        BUILD_OUTPUT="${PROJECT_ROOT}/build"
        INSTALL_DIR="${PROJECT_ROOT}/install"

        echo "project-root-dir=${PROJECT_ROOT}" >> "$GITHUB_OUTPUT"
        echo "build-output-dir=${BUILD_OUTPUT}" >> "$GITHUB_OUTPUT"
        echo "install-dir=${INSTALL_DIR}" >> "$GITHUB_OUTPUT"

    - name: Install ICU and libxml2 (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update && sudo apt-get install -y libicu-dev icu-devtools libxml2-dev
        echo "ICU_ROOT=/usr" >> $GITHUB_ENV
        echo "LIBXML2_ROOT=/usr" >> $GITHUB_ENV

    - name: Install ICU and libxml2 (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install icu4c libxml2
        echo "ICU_ROOT=$(brew --prefix icu4c)" >> $GITHUB_ENV
        echo "LIBXML2_ROOT=$(brew --prefix libxml2)" >> $GITHUB_ENV

    - name: Install vcpkg and dependencies (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $vcpkg_root = "${{ runner.temp }}\vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $vcpkg_root
        cd $vcpkg_root
        .\bootstrap-vcpkg.bat
        .\vcpkg install icu:x64-windows libxml2:x64-windows
        echo "ICU_ROOT=$vcpkg_root\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LIBXML2_ROOT=$vcpkg_root\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Fix ICU cmake file (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $ICU_CMAKE_FILE="${{ steps.strings.outputs.project-root-dir }}/cmake/dependICU.cmake"
        echo "Content of dependICU.cmake:"
        cat $ICU_CMAKE_FILE
        
        # Create a backup
        Copy-Item -Path $ICU_CMAKE_FILE -Destination "${ICU_CMAKE_FILE}.bak"
        
        # Replace the entire file with a simpler version that just sets the variables
        @"
# Override ICU detection - manually set by CI system
set(ICU_INCLUDE_DIR "${{ env.ICU_ROOT }}/include")
set(ICU_LIBRARY_DIR "${{ env.ICU_ROOT }}/lib")
set(ICU_LIBRARY "${{ env.ICU_ROOT }}/lib/icuuc.lib")
set(ICU_FOUND TRUE)
"@ | Out-File -FilePath $ICU_CMAKE_FILE -Encoding utf8

    - name: Configure CMake (Non-Windows)
      if: matrix.os != 'windows-latest'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_INSTALL_PREFIX="${{ steps.strings.outputs.install-dir }}"
        -S ${{ steps.strings.outputs.project-root-dir }}

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
        $INSTALL_DIR="${{ steps.strings.outputs.install-dir }}"
        $PROJECT_DIR="${{ steps.strings.outputs.project-root-dir }}"

        echo "Using BUILD_DIR: $BUILD_DIR"
        echo "Using INSTALL_DIR: $INSTALL_DIR"
        echo "Using PROJECT_DIR: $PROJECT_DIR"

        cmake -B "$BUILD_DIR" `
              -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} `
              -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" `
              -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
              -DICU_INCLUDE_DIR="${{ env.ICU_ROOT }}\include" `
              -DICU_LIBRARY="${{ env.ICU_ROOT }}\lib\icuuc.lib" `
              -DICU_LIBRARY_DIR="${{ env.ICU_ROOT }}\lib" `
              -DICU_FOUND=TRUE `
              -G "${{ matrix.cmake_generator }}" `
              -S "$PROJECT_DIR"

    - name: Get number of CPU cores
      uses: SimenB/github-actions-cpu-cores@v2
      id: cpu-cores

    - name: Build (Non-Windows)
      if: matrix.os != 'windows-latest'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --parallel ${{ steps.cpu-cores.outputs.count }}

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --parallel ${{ steps.cpu-cores.outputs.count }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --output-on-failure
